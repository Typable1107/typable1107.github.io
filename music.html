<!DOCTYPE html>
<html lang="en"><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music — Typable Studios</title>
  <link href="css2.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0e0f1a;
      --text:    #e8e4dc;
      --muted:   #7a776f;
      --cyan:    #5bbcd1;
      --gold:    #c8973a;
      --display: 'Unbounded', sans-serif;
      --body:    'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--body);
      font-size: 16px;
      line-height: 1.75;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }

    /* ── NAV ── */
    nav {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 1.4rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .nav-name {
      font-family: var(--display);
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.04em;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
      font-size: 0.8rem;
      letter-spacing: 0.04em;
    }

    .nav-links a { color: var(--muted); transition: color 0.15s; }
    .nav-links a:hover { color: var(--text); }
    .nav-links a.active { color: var(--text); }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: 3.5rem 0 3rem;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .page-header h1 {
      font-family: var(--display);
      font-size: clamp(2.2rem, 6vw, 4rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .page-header h1 .accent { color: var(--cyan); }

    /* ── DISCOGRAPHY GRID ── */

    /*
    =====================================================
    TO ADD A NEW RELEASE:
    Copy one <a class="release"> block and paste it
    ABOVE the first existing release in the grid.
    Fill in the href, title, type, year, and art.
    =====================================================
    */

    .discography {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      padding: 3rem 0;
    }

    .release {
      display: block;
      text-decoration: none;
      color: inherit;
      position: relative;
    }

    .release:hover .release-art { opacity: 0.75; }
    .release:hover .release-title { color: var(--cyan); }

    .release-art {
      width: 100%;
      aspect-ratio: 1;
      background: #1a1b2e;
      border: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.08em;
      overflow: hidden;
      margin-bottom: 0.8rem;
      transition: opacity 0.2s;
    }

    /* To add album art, replace placeholder text with:
       <img src="your-art.jpg" alt="Release Title" style="width:100%;height:100%;object-fit:cover"> */

    .release-title {
      font-family: var(--display);
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 0.25rem;
      transition: color 0.15s;
    }

    .release-meta {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .release-type {
      color: var(--cyan);
      margin-right: 0.4rem;
    }

    /* ── FOOTER ── */
    footer {
      padding: 2rem 0 3rem;
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.18);
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      body { padding: 0 1.2rem; }
      .nav-links { gap: 1.2rem; }
      .discography { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
      footer { flex-direction: column; gap: 0.4rem; }
    }
  </style>
</head>
<body>

  <!-- ── NAV ── -->
  <nav>
    <div class="nav-name"><a href="index.html">TYPABLE STUDIOS</a></div>
    <ul class="nav-links">
      <li><a href="index.html#about">About</a></li>
      <li><a href="music.html" class="active">Music</a></li>
      
      <li><a href="index.html#contact">Contact</a></li>
    </ul>
  </nav>

  <!-- ── PAGE HEADER ── -->
  <div class="page-header">
    <h1>DISCOGRAPHY<br><span class="accent">&amp; PROJECTS</span></h1>
  </div>
  <div class="discography">

    <!-- RELEASE — copy this whole block to add a new one -->
    <a class="release" href="releases/skyscrapers/skyscrapers.html">
      <div class="release-art">
        <img style="width:100%;height:100%;object-fit:cover" alt="Skyscrapers Cover" src="releases/skyscrapers/cover.jpg">
      </div>
      <div class="release-title">Skyscrapers</div>
      <div class="release-meta">
        <span class="release-type">Single</span>
        <span class="release-year">2026</span>
      </div>
    </a>
    
    <a class="release" href="releases/threshold/threshold.html">
      <div class="release-art">
        <img style="width:100%;height:100%;object-fit:cover" alt="Threshold Cover" src="releases/threshold/cover.jpg">
      </div>
      <div class="release-title">Threshold</div>
      <div class="release-meta">
        <span class="release-type">EP</span>
        <span class="release-year">2026</span>
      </div>
    </a>
    
    <a class="release" href="releases/synthetic_garden/synthetic_garden.html">
      <div class="release-art">
  <img style="width:100%;height:100%;object-fit:cover" alt="Synthetic Garden Cover" src="releases/synthetic_garden/cover.jpg">
        </div>
      <div class="release-title">Synthetic Garden</div>
      <div class="release-meta">
        <span class="release-type">EP</span>
        <span class="release-year">2025</span>
      </div>
    </a>
  </div>

  <!-- ── FOOTER ── -->
  <footer>
    <span>© <span id="year">2026</span> Typable Studios</span>
    <span>Made with HTML &amp; CSS</span>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
  
</body></html>
